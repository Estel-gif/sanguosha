<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀本命武将测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            min-height: 350px;
        }
        h1 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 30px;
        }
        
        .page-step { display: none; }
        .page-step.active { display: block; animation: fadeIn 0.5s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-title {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .options label {
            display: block;
            margin-bottom: 12px;
            padding: 15px;
            background-color: #fafafa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .options label:hover {
            background-color: #f5f5f5;
            border-color: #bdbdbd;
        }
        .options input[type="radio"]:checked + span {
            font-weight: bold;
            color: #d32f2f;
        }
        
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #b71c1c;
        }
        
        .error-msg {
            color: #d32f2f;
            font-size: 0.9em;
            margin-top: 10px;
            display: none;
        }

        #result { text-align: center; }
        #result h2 { color: #d32f2f; margin-bottom: 20px; }
        .progress {
            text-align: right;
            color: #9e9e9e;
            font-size: 0.9em;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 三国杀操作风格测试</h1>
    
    <form id="quizForm">
        
        <!-- 欢迎页 -->
        <div id="step-0" class="page-step active">
            <p style="text-align: center; font-size: 1.1em; line-height: 1.8;">
                在三国杀的战场上，有人喜欢简单粗暴，有人喜欢细致操作。<br>
                完成这 5 个问题，测测你最适合哪位“阴间”武将！
            </p>
            <button type="button" onclick="nextStep(0, 1)">开始匹配</button>
        </div>

        <!-- 第1题 -->
        <div id="step-1" class="page-step">
            <div class="progress">1 / 5</div>
            <div class="question-title">1. 玩任何游戏时，你最追求哪种快感？</div>
            <div class="options">
                <label><input type="radio" name="q1" value="zhongyu"> <span>A. 极致的微操，用复杂的连招秀翻全场。</span></label>
                <label><input type="radio" name="q1" value="weilvbu"> <span>B. 简单粗暴，数值碾压，平A即是真理。</span></label>
                <label><input type="radio" name="q1" value="xuelingyun"> <span>C. 疯狂闪避，看着敌人打不到我气急败坏的样子。</span></label>
                <label><input type="radio" name="q1" value="mouhuanggai"> <span>D. 刀尖舔血，追求一击必杀的极限爆发。</span></label>
                <label><input type="radio" name="q1" value="xuyou"> <span>E. 掌控全局，资源无限，我的回合还是我的回合。</span></label>
            </div>
            <p id="error-1" class="error-msg">请先选择一个选项哦！</p>
            <button type="button" onclick="nextStep(1, 2)">下一题</button>
        </div>

        <!-- 第2题 -->
        <div id="step-2" class="page-step">
            <div class="progress">2 / 5</div>
            <div class="question-title">2. 面对一个血量很厚的高手，你会怎么打？</div>
            <div class="options">
                <label><input type="radio" name="q2" value="mouhuanggai"> <span>A. 攒满怒气和Buff，找准机会一波带走！</span></label>
                <label><input type="radio" name="q2" value="xuelingyun"> <span>B. 敌进我退，疯狂拉扯，慢慢把他耗死。</span></label>
                <label><input type="radio" name="q2" value="zhongyu"> <span>C. 仔细计算他的技能冷却，用细节操作建立优势。</span></label>
                <label><input type="radio" name="q2" value="weilvbu"> <span>D. 废话少说，直接冲上去硬刚，拼的就是面板属性！</span></label>
                <label><input type="radio" name="q2" value="xuyou"> <span>E. 利用机制不断刷牌/刷资源，用牌量淹没他。</span></label>
            </div>
            <p id="error-2" class="error-msg">请先选择一个选项哦！</p>
            <button type="button" onclick="nextStep(2, 3)">下一题</button>
        </div>

        <!-- 第3题 -->
        <div id="step-3" class="page-step">
            <div class="progress">3 / 5</div>
            <div class="question-title">3. 在团队合作中，你最讨厌遇到什么情况？</div>
            <div class="options">
                <label><input type="radio" name="q3" value="weilvbu"> <span>A. 队友磨磨唧唧，不敢上去打输出。</span></label>
                <label><input type="radio" name="q3" value="zhongyu"> <span>B. 队友乱放技能，打断了我的完美连招。</span></label>
                <label><input type="radio" name="q3" value="xuyou"> <span>C. 资源不够分配，导致我无法尽情发挥。</span></label>
                <label><input type="radio" name="q3" value="xuelingyun"> <span>D. 队友太脆，导致我失去了拉扯的空间。</span></label>
                <label><input type="radio" name="q3" value="mouhuanggai"> <span>E. 关键时刻爆发伤害差了一点点，没能秒掉对面。</span></label>
            </div>
            <p id="error-3" class="error-msg">请先选择一个选项哦！</p>
            <button type="button" onclick="nextStep(3, 4)">下一题</button>
        </div>

        <!-- 第4题 -->
        <div id="step-4" class="page-step">
            <div class="progress">4 / 5</div>
            <div class="question-title">4. 如果能拥有一种超能力，你希望是？</div>
            <div class="options">
                <label><input type="radio" name="q4" value="xuelingyun"> <span>A. 绝对闪避（任何攻击都无法触碰你）</span></label>
                <label><input type="radio" name="q4" value="mouhuanggai"> <span>B. 致命一击（每天一次，无视防御秒杀目标）</span></label>
                <label><input type="radio" name="q4" value="xuyou"> <span>C. 时间静止（别人动不了，只有你能一直行动）</span></label>
                <label><input type="radio" name="q4" value="zhongyu"> <span>D. 超级大脑（能瞬间计算出最优解和所有可能性）</span></label>
                <label><input type="radio" name="q4" value="weilvbu"> <span>E. 钢铁之躯（拥有无坚不摧的力量和防御）</span></label>
            </div>
            <p id="error-4" class="error-msg">请先选择一个选项哦！</p>
            <button type="button" onclick="nextStep(4, 5)">下一题</button>
        </div>

        <!-- 第5题 -->
        <div id="step-5" class="page-step">
            <div class="progress">5 / 5</div>
            <div class="question-title">5. 当你拿到全场MVP（最佳玩家）时，你的内心OS是：</div>
            <div class="options">
                <label><input type="radio" name="q5" value="xuyou"> <span>A. “看我一个人表演就完事了，牌多就是可以为所欲为。”</span></label>
                <label><input type="radio" name="q5" value="mouhuanggai"> <span>B. “那一刀的伤害，就问你们爽不爽？！”</span></label>
                <label><input type="radio" name="q5" value="zhongyu"> <span>C. “基操勿6，全靠细节和脑子。”</span></label>
                <label><input type="radio" name="q5" value="xuelingyun"> <span>D. “哎呀，你们怎么就是摸不到我呢？真苦恼~”</span></label>
                <label><input type="radio" name="q5" value="weilvbu"> <span>E. “在绝对的力量面前，一切花里胡哨都是徒劳！”</span></label>
            </div>
            <p id="error-5" class="error-msg">请先选择一个选项哦！</p>
            <button type="button" onclick="calculateResult()">查看我的本命武将</button>
        </div>

        <!-- 结果页 -->
        <div id="step-result" class="page-step">
            <div id="result">
                <h2>🎉 你的本命武将是：</h2>
                <p id="heroName" style="font-size: 2em; font-weight: bold; color: #d32f2f; margin: 15px 0;"></p>
                <p id="heroTag" style="font-size: 1.2em; color: #555; font-weight: bold; margin-bottom: 15px;"></p>
                <p id="heroDesc" style="line-height: 1.6; background-color: #fce4ec; padding: 20px; border-radius: 8px; text-align: left;"></p>
                <button type="button" onclick="restartQuiz()" style="background-color: #757575; margin-top: 30px;">重新测试</button>
            </div>
        </div>

    </form>
</div>

<script>
    function nextStep(currentStep, nextStepNum) {
        if (currentStep > 0) {
            const form = document.getElementById('quizForm');
            const selected = form['q' + currentStep].value;
            if (!selected) {
                document.getElementById('error-' + currentStep).style.display = 'block';
                return;
            } else {
                document.getElementById('error-' + currentStep).style.display = 'none';
            }
        }
        document.getElementById('step-' + currentStep).classList.remove('active');
        document.getElementById('step-' + nextStepNum).classList.add('active');
    }

    function calculateResult() {
        const form = document.getElementById('quizForm');
        if (!form.q5.value) {
            document.getElementById('error-5').style.display = 'block';
            return;
        }

        document.getElementById('step-5').classList.remove('active');
        document.getElementById('step-result').classList.add('active');

        let scores = {
            'zhongyu': 0, 'weilvbu': 0, 'xuelingyun': 0, 'mouhuanggai': 0, 'xuyou': 0
        };

        // 统计5道题的得分
        for (let i = 1; i <= 5; i++) {
            let answer = form['q' + i].value;
            if (answer) scores[answer]++;
        }

        let maxScore = 0;
        let topHero = '';
        for (let hero in scores) {
            if (scores[hero] > maxScore) {
                maxScore = scores[hero];
                topHero = hero;
            }
        }

        let heroNameText = "";
        let heroTagText = "";
        let heroDescText = "";

        switch(topHero) {
            case 'zhongyu':
                heroNameText = "钟毓";
                heroTagText = "【操作拉满 · 细节狂魔】";
                heroDescText = "你是一个极具操作天赋的玩家！你不喜欢无脑互砍，而是享受通过复杂的技能联动、精准的计算来建立优势。在别人眼里繁琐的操作，在你手里就是华丽的艺术。只要给你操作空间，你就能秀翻全场！";
                break;
            case 'weilvbu':
                heroNameText = "威吕布";
                heroTagText = "【简单粗暴 · 纯粹碾压】";
                heroDescText = "花里胡哨？不存在的！你信奉“大力出奇迹”，喜欢最直接、最暴力的输出方式。你不需要复杂的思考，只要面板够硬、伤害够高，一路平推过去就完事了。一力降十会，你就是战场上的推土机！";
                break;
            case 'xuelingyun':
                heroNameText = "薛灵芸";
                heroTagText = "【究极扭扭怪 · 搞心态大师】";
                heroDescText = "你的游戏风格主打一个“灵动”和“折磨”。你非常享受在敌人的攻击中穿梭自如，你擅长拉扯和消耗，能在不知不觉中搞崩对手的心态，是让人又爱又恨的存在。";
                break;
            case 'mouhuanggai':
                heroNameText = "谋黄盖";
                heroTagText = "【一刀999 · 极致爆发】";
                heroDescText = "你有一颗大心脏，追求高风险高回报的刺激感！你不喜欢温水煮青蛙，而是喜欢隐忍蓄力，然后在最关键的时刻爆发出毁天灭地的伤害。对你来说，游戏最大的乐趣就是看着敌人的血条瞬间清空的快感！";
                break;
            case 'xuyou':
                heroNameText = "许攸";
                heroTagText = "【疯狂过牌 · 掌控雷电】";
                heroDescText = "“我的回合，还是我的回合！”你是一个极度依赖资源和手牌的玩家。你享受通过技能不断摸牌、洗牌、控场的快感。当你启动的时候，全场只能静静地看着你表演。只要牌不断，你就是无敌的！";
                break;
        }

        document.getElementById('heroName').innerText = heroNameText;
        document.getElementById('heroTag').innerText = heroTagText;
        document.getElementById('heroDesc').innerText = heroDescText;
    }

    function restartQuiz() {
        document.getElementById('quizForm').reset();
        document.getElementById('step-result').classList.remove('active');
        document.getElementById('step-0').classList.add('active');
    }
</script>

</body>
</html>
